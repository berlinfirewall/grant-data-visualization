<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sphereGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.30165941" stop-color="#ad9a18"/>
      <stop offset="1" stop-color="#d2c84a"/>
    </linearGradient>
    <linearGradient id="gloss" x1="50" y1="8" x2="50" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="borderGrad">
      <stop stop-color="#9b8400"/>
      <stop offset="0.94612485" stop-color="#d2c84a"/>
    </linearGradient>
  </defs>
  <!-- Border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#borderGrad)" stroke-width="4"/>
  <!-- Sphere body -->
  <circle cx="50" cy="50" r="44" fill="url(#sphereGrad)"/>
  <!-- Gloss highlight -->
  <path d="M 18,30 C 18,17 32,8 50,8 C 68,8 82,17 82,30 C 82,42 68,45 50,45 C 32,45 18,42 18,30 Z" fill="url(#gloss)"/>
  <!-- Open square for restore -->
  <rect x="35" y="35" width="30" height="30" rx="3" ry="3" fill="none" stroke="rgba(60,40,0,0.75)" stroke-width="4"/>
</svg>
